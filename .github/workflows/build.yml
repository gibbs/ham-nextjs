name: Build

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          API_KEY: test-api-key
          BIN_SERVICE_URL: http://localhost:8080/api/bin_collection/
          BIN_COLLECTION_COUNCIL: TorridgeDistrictCouncil
          BIN_COLLECTION_URL: https://collections-torridge.azurewebsites.net/WebService2.asmx
          BIN_COLLECTION_UPRN: '100041202555'
