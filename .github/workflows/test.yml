name: Test

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  format:
    name: Format
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Format
        run: npm run format:check

  unit:
    name: Unit Tests
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test -- --ci --coverage
        env:
          API_KEY: test-api-key
          BIN_SERVICE_URL: http://localhost:8080/api/bin_collection/
          BIN_COLLECTION_COUNCIL: TorridgeDistrictCouncil
          BIN_COLLECTION_URL: https://collections-torridge.azurewebsites.net/WebService2.asmx
          BIN_COLLECTION_UPRN: '100041202555'

  e2e:
    name: E2E Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
          API_KEY: test-api-key
          BIN_SERVICE_URL: http://localhost:8080/api/bin_collection/
          BIN_COLLECTION_COUNCIL: TorridgeDistrictCouncil
          BIN_COLLECTION_URL: https://collections-torridge.azurewebsites.net/WebService2.asmx
          BIN_COLLECTION_UPRN: '100041202555'

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
